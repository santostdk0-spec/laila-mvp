
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laila IA - Interface</title>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .container { text-align: center; position: relative; width: 400px; height: 400px; }

        /* O Cérebro Central */
        .core {
            width: 120px; height: 120px; background: linear-gradient(135.21deg, #8A2BE2 0%, #4B0082 100%);
            border-radius: 30px; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.3); z-index: 10;
        }

        /* Os Agentes Especialistas (Círculo) */
        .agent {
            width: 50px; height: 50px; background: white; border-radius: 12px;
            position: absolute; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 20px; transition: 0.3s;
        }

        .agent:hover { transform: scale(1.2); cursor: pointer; border: 2px solid #8A2BE2; }

        /* Posicionamento Circular (Matemática Pura) */
        .a1 { top: 0%; left: 50%; transform: translateX(-50%); } /* Planner */
        .a2 { top: 15%; right: 15%; } /* Search */
        .a3 { top: 50%; right: 0%; transform: translateY(-50%); } /* Analyst */
        .a4 { bottom: 15%; right: 15%; } /* Art */
        .a5 { bottom: 0%; left: 50%; transform: translateX(-50%); } /* Code */
        .a6 { bottom: 15%; left: 15%; } /* Health */
        .a7 { top: 50%; left: 0%; transform: translateY(-50%); } /* Law */
        .a8 { top: 15%; left: 15%; } /* Finance */

        .title { margin-top: 450px; }
        .title h1 { color: #333; margin: 0; }
        .title span { color: #8A2BE2; }
    </style>
</head>
<body>

    <div class="container">
        <div class="core">🧠</div>

        <div class="agent a1" title="Planner">🗓️</div>
        <div class="agent a2" title="Search">🔍</div>
        <div class="agent a3" title="Analyst">💼</div>
        <div class="agent a4" title="Art">🎨</div>
        <div class="agent a5" title="Code">💻</div>
        <div class="agent a6" title="Health">🏥</div>
        <div class="agent a7" title="Law">⚖️</div>
        <div class="agent a8" title="Finance">💰</div>

        <div class="title">
            <h1>Olá! Sou a <span>Laila IA</span></h1>
            <p>Inteligência artificial com arquitetura de mente colmeia.</p>
        </div>
    </div>

</body>
</html>
